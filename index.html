    <script>
      // Protection against fetch property reassignment TypeError
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch && typeof originalFetch === 'function') {
            const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
            if (!descriptor || descriptor.configurable) {
              Object.defineProperty(window, 'fetch', {
                configurable: true,
                enumerable: true,
                get: function() { return originalFetch; },
                set: function(v) { 
                  console.warn("An attempt to reassign window.fetch was blocked to prevent a TypeError. Value was:", v);
                  return originalFetch;
                }
              });
            }
          }
        } catch (e) {
          // Fail silently if defineProperty is not allowed
        }
      })();
    </script>
